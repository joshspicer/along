name: Release server

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version without a leading v
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-server
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/joshspicer/along-server:${{ inputs.version }}
            ghcr.io/joshspicer/along-server:sha-${{ github.sha }}
          build-args: GIT_COMMIT=${{ github.sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/joshspicer/along-server
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

