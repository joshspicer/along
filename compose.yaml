name: along

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: along
      POSTGRES_USER: along
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U along -d along"]
      interval: 10s
      timeout: 5s
      retries: 10
    shm_size: 256mb
    mem_limit: 1g
    cpus: 1.0
    security_opt:
      - no-new-privileges:true

  migrate:
    image: ${ALONG_SERVER_IMAGE:-ghcr.io/joshspicer/along-server:main}
    build:
      context: ./server
      args:
        GIT_COMMIT: ${GIT_COMMIT:-development}
    entrypoint: ["/app/migrate"]
    environment:
      ALONG_ENV: ${ALONG_ENV:-production}
      ALONG_DOMAIN: ${ALONG_DOMAIN:-along.spicer.dev}
      DATABASE_URL_FILE: /run/secrets/database_url
      JWT_SIGNING_KEY_FILE: /run/secrets/jwt_signing_key
      PUSH_ENCRYPTION_KEY_FILE: /run/secrets/push_encryption_key
    secrets:
      - database_url
      - jwt_signing_key
      - push_encryption_key
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    restart: "no"
    security_opt:
      - no-new-privileges:true

  along:
    image: ${ALONG_SERVER_IMAGE:-ghcr.io/joshspicer/along-server:main}
    build:
      context: ./server
      args:
        GIT_COMMIT: ${GIT_COMMIT:-development}
    restart: unless-stopped
    expose:
      - "6009"
    environment:
      ALONG_ENV: ${ALONG_ENV:-production}
      HTTP_ADDRESS: :6009
      ALONG_DOMAIN: ${ALONG_DOMAIN:-along.spicer.dev}
      DATABASE_URL_FILE: /run/secrets/database_url
      JWT_SIGNING_KEY_FILE: /run/secrets/jwt_signing_key
      PUSH_ENCRYPTION_KEY_FILE: /run/secrets/push_encryption_key
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-N7C8DEK852}
      ANDROID_SIGNING_SHA256: ${ANDROID_SIGNING_SHA256:-}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-10m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-720h}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      TRUST_PROXY_HEADERS: "true"
    secrets:
      - database_url
      - jwt_signing_key
      - push_encryption_key
    depends_on:
      migrate:
        condition: service_completed_successfully
    read_only: true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:6009/health/ready"]
      interval: 15s
      timeout: 3s
      retries: 5
    networks:
      - default
      - npm
    mem_limit: 256m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true

  apns:
    profiles: ["push"]
    image: ${ALONG_SERVER_IMAGE:-ghcr.io/joshspicer/along-server:main}
    entrypoint: ["/app/apns-worker"]
    restart: unless-stopped
    environment:
      ALONG_ENV: ${ALONG_ENV:-production}
      ALONG_DOMAIN: ${ALONG_DOMAIN:-along.spicer.dev}
      DATABASE_URL_FILE: /run/secrets/database_url
      JWT_SIGNING_KEY_FILE: /run/secrets/jwt_signing_key
      PUSH_ENCRYPTION_KEY_FILE: /run/secrets/push_encryption_key
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_KEY_PATH: /run/secrets/apns_key
      APNS_TOPIC: com.joshspicer.along
      APNS_ENVIRONMENT: ${APNS_ENVIRONMENT:-production}
    secrets:
      - database_url
      - jwt_signing_key
      - push_encryption_key
      - apns_key
    depends_on:
      migrate:
        condition: service_completed_successfully
    read_only: true
    mem_limit: 192m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true

  backup:
    profiles: ["operations"]
    build: ./deploy/backup
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      BACKUP_AGE_RECIPIENT: ${BACKUP_AGE_RECIPIENT:-}
      BACKUP_UPLOAD_URL: ${BACKUP_UPLOAD_URL:-}
      BACKUP_UPLOAD_TOKEN_FILE: /run/secrets/backup_upload_token
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    secrets:
      - database_url
      - backup_upload_token
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    security_opt:
      - no-new-privileges:true

networks:
  npm:
    external: true
    name: ${NPM_NETWORK:-nginx-proxy-manager_default}

volumes:
  postgres_data:

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:-./secrets/postgres_password}
  database_url:
    file: ${DATABASE_URL_FILE:-./secrets/database_url}
  jwt_signing_key:
    file: ${JWT_SIGNING_KEY_FILE:-./secrets/jwt_signing_key}
  push_encryption_key:
    file: ${PUSH_ENCRYPTION_KEY_FILE:-./secrets/push_encryption_key}
  apns_key:
    file: ${APNS_KEY_FILE:-./secrets/AuthKey.p8}
  backup_upload_token:
    file: ${BACKUP_UPLOAD_TOKEN_FILE:-./secrets/backup_upload_token}
